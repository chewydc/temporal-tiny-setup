# ============================================================================
# AIRFLOW 3.x HA + GALERA CLUSTER (3 REGIONES)
# ============================================================================
# Hornos: Airflow + MariaDB Galera Node 1
# SanLorenzo: Airflow + MariaDB Galera Node 2
# Tucuman: Solo Galera Arbitrator
# Router: Conecta las 3 redes regionales
# ============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    # Conexión directa a Galera (sin MaxScale)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@galera-vip:3306/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis-hornos:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@galera-vip:3306/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver-hornos:8080"
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
    AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
    AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow.cfg:/opt/airflow/airflow.cfg
    - airflow-logs:/opt/airflow/logs
  depends_on:
    galera-hornos:
      condition: service_healthy
    redis-hornos:
      condition: service_healthy

services:

  # ========================================================================
  # ROUTER CENTRAL - Conecta las 3 redes regionales
  # ========================================================================
  vrouter:
    image: alpine:latest
    container_name: vrouter
    hostname: vrouter
    privileged: true
    command: >
      sh -c '
        apk add --no-cache iptables iproute2 tcpdump &&
        echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf &&
        sysctl -p &&
        
        # Configurar rutas entre redes
        ip route add 172.20.0.0/24 via 172.19.0.1 dev eth0 2>/dev/null || true
        ip route add 172.21.0.0/24 via 172.19.0.1 dev eth1 2>/dev/null || true
        ip route add 172.22.0.0/24 via 172.19.0.1 dev eth2 2>/dev/null || true
        
        echo "=== VROUTER READY ==="
        echo "Para desconectar Hornos: docker exec vrouter iptables -A FORWARD -s 172.20.0.0/24 -j DROP"
        echo "Para desconectar SanLorenzo: docker exec vrouter iptables -A FORWARD -s 172.21.0.0/24 -j DROP"
        echo "Para desconectar Tucuman: docker exec vrouter iptables -A FORWARD -s 172.22.0.0/24 -j DROP"
        echo "Para reconectar: docker exec vrouter iptables -F FORWARD"
        
        tail -f /dev/null
      '
    networks:
      - net-hornos
      - net-sanlorenzo
      - net-tucuman
    ports:
      - "9999:22"  # Para debug SSH si necesitas

  # ========================================================================
  # REGION HORNOS - Airflow + Galera Node 1
  # ========================================================================
  
  galera-hornos:
    image: mariadb:10.11
    container_name: galera-hornos
    hostname: galera-hornos
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./galera/hornos-init.sql:/docker-entrypoint-initdb.d/init.sql
      - galera-hornos-data:/var/lib/mysql
    command: >
      --wsrep-new-cluster
      --wsrep-cluster-name=galera_cluster
      --wsrep-cluster-address="gcomm://galera-hornos,galera-sanlorenzo"
      --wsrep-node-name=hornos
      --wsrep-node-address=galera-hornos
      --wsrep-provider=/usr/lib/galera/libgalera_smm.so
      --wsrep-sst-method=rsync
      --binlog-format=ROW
      --default-storage-engine=InnoDB
      --innodb-autoinc-lock-mode=2
      --bind-address=0.0.0.0
      --wsrep-provider-options="pc.weight=1;pc.ignore_quorum=false"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      net-hornos:
        aliases:
          - galera-vip  # VIP para conexiones de Airflow
    ports:
      - "3306:3306"  # Para debug externo

  redis-hornos:
    image: redis:7-alpine
    container_name: redis-hornos
    hostname: redis-hornos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - net-hornos

  airflow-init-hornos:
    <<: *airflow-common
    container_name: airflow-init-hornos
    environment:
      <<: *airflow-common
      _AIRFLOW_DB_MIGRATE: "true"
    networks:
      - net-hornos
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - bash
      - -c
      - |
        echo "=== Airflow 3.x DB Migration (Hornos) ==="
        airflow db migrate
        echo "=== Init Complete ==="
    restart: "no"

  airflow-apiserver-hornos:
    <<: *airflow-common
    container_name: airflow-apiserver-hornos
    hostname: airflow-apiserver-hornos
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    networks:
      - net-hornos
    restart: unless-stopped

  airflow-scheduler-hornos:
    <<: *airflow-common
    container_name: airflow-scheduler-hornos
    hostname: airflow-scheduler-hornos
    command: scheduler
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    networks:
      - net-hornos
    restart: unless-stopped

  airflow-worker-hornos:
    <<: *airflow-common
    container_name: airflow-worker-hornos
    hostname: airflow-worker-hornos
    command: celery worker
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    networks:
      - net-hornos
    restart: unless-stopped

  # ========================================================================
  # REGION SAN LORENZO - Airflow + Galera Node 2
  # ========================================================================
  
  galera-sanlorenzo:
    image: mariadb:10.11
    container_name: galera-sanlorenzo
    hostname: galera-sanlorenzo
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./galera/sanlorenzo-init.sql:/docker-entrypoint-initdb.d/init.sql
      - galera-sanlorenzo-data:/var/lib/mysql
    command: >
      --wsrep-cluster-name=galera_cluster
      --wsrep-cluster-address="gcomm://galera-hornos,galera-sanlorenzo"
      --wsrep-node-name=sanlorenzo
      --wsrep-node-address=galera-sanlorenzo
      --wsrep-provider=/usr/lib/galera/libgalera_smm.so
      --wsrep-sst-method=rsync
      --binlog-format=ROW
      --default-storage-engine=InnoDB
      --innodb-autoinc-lock-mode=2
      --bind-address=0.0.0.0
      --wsrep-provider-options="pc.weight=1;pc.ignore_quorum=false"
    depends_on:
      galera-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      net-sanlorenzo:
        aliases:
          - galera-vip  # VIP alternativo
    ports:
      - "3307:3306"  # Para debug externo

  redis-sanlorenzo:
    image: redis:7-alpine
    container_name: redis-sanlorenzo
    hostname: redis-sanlorenzo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - net-sanlorenzo

  airflow-init-sanlorenzo:
    <<: *airflow-common
    container_name: airflow-init-sanlorenzo
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis-sanlorenzo:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver-sanlorenzo:8081"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
      _AIRFLOW_DB_MIGRATE: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow.cfg:/opt/airflow/airflow.cfg
      - airflow-logs:/opt/airflow/logs
    depends_on:
      galera-sanlorenzo:
        condition: service_healthy
      redis-sanlorenzo:
        condition: service_healthy
    networks:
      - net-sanlorenzo
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - bash
      - -c
      - |
        echo "=== Waiting for Galera Sync (SanLorenzo) ==="
        sleep 30
        echo "=== SanLorenzo Init Complete ==="
    restart: "no"

  airflow-apiserver-sanlorenzo:
    <<: *airflow-common
    container_name: airflow-apiserver-sanlorenzo
    hostname: airflow-apiserver-sanlorenzo
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis-sanlorenzo:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver-sanlorenzo:8081"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
    command: api-server
    ports:
      - "8081:8080"
    depends_on:
      airflow-init-sanlorenzo:
        condition: service_completed_successfully
    networks:
      - net-sanlorenzo
    restart: unless-stopped

  airflow-scheduler-sanlorenzo:
    <<: *airflow-common
    container_name: airflow-scheduler-sanlorenzo
    hostname: airflow-scheduler-sanlorenzo
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis-sanlorenzo:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver-sanlorenzo:8081"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
    command: scheduler
    depends_on:
      airflow-init-sanlorenzo:
        condition: service_completed_successfully
    networks:
      - net-sanlorenzo
    restart: unless-stopped

  airflow-worker-sanlorenzo:
    <<: *airflow-common
    container_name: airflow-worker-sanlorenzo
    hostname: airflow-worker-sanlorenzo
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis-sanlorenzo:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@galera-vip:3306/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver-sanlorenzo:8081"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
    command: celery worker
    depends_on:
      airflow-init-sanlorenzo:
        condition: service_completed_successfully
    networks:
      - net-sanlorenzo
    restart: unless-stopped

  # ========================================================================
  # REGION TUCUMAN - Solo Galera Arbitrator
  # ========================================================================
  
  galera-arbitrator:
    image: mariadb:10.11
    container_name: galera-arbitrator
    hostname: galera-arbitrator
    command: >
      sh -c '
        echo "=== Iniciando Galera Arbitrator (Tucuman) ==="
        
        # Instalar garbd si no existe
        apt-get update && apt-get install -y galera-arbitrator-4 || true
        
        # Esperar a que los nodos principales estén listos
        sleep 60
        
        echo "=== Conectando Arbitrator al Cluster ==="
        garbd \
          --group="galera_cluster" \
          --address="gcomm://galera-hornos:4567,galera-sanlorenzo:4567" \
          --options="pc.weight=1" \
          --log=/var/log/garbd.log \
          --daemon=false
      '
    depends_on:
      galera-hornos:
        condition: service_healthy
      galera-sanlorenzo:
        condition: service_healthy
    networks:
      - net-tucuman
    restart: unless-stopped

  # ========================================================================
  # MONITOR DE CLUSTER - Para debug
  # ========================================================================
  
  cluster-monitor:
    image: alpine:latest
    container_name: cluster-monitor
    hostname: cluster-monitor
    command: >
      sh -c '
        apk add --no-cache mysql-client curl &&
        echo "=== CLUSTER MONITOR READY ===" &&
        echo "Comandos útiles:" &&
        echo "docker exec cluster-monitor mysql -h galera-hornos -u root -proot_pass -e \"SHOW STATUS LIKE \\\"wsrep%\\\"\"" &&
        echo "docker exec cluster-monitor mysql -h galera-sanlorenzo -u root -proot_pass -e \"SHOW STATUS LIKE \\\"wsrep%\\\"\"" &&
        tail -f /dev/null
      '
    networks:
      - net-hornos
      - net-sanlorenzo
      - net-tucuman

volumes:
  galera-hornos-data:
  galera-sanlorenzo-data:
  airflow-logs:

networks:
  net-hornos:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  net-sanlorenzo:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  net-tucuman:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24