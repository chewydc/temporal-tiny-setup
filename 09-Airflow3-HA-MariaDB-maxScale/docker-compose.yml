version: '3.8'

services:
  # ============================================================================
  # MARIADB DATABASES - RED ÚNICA SIMPLIFICADA
  # ============================================================================
  mariadb-hornos:
    image: mariadb:10.11
    container_name: mariadb-hornos
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./mariadb/primary/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mariadb/primary/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mariadb-sanlorenzo:
    image: mariadb:10.11
    container_name: mariadb-sanlorenzo
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./mariadb/replica/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mariadb/replica/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mariadb-tucuman:
    image: mariadb:10.11
    container_name: mariadb-tucuman
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./mariadb/arbitrator/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mariadb/arbitrator/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3308:3306"
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # MAXSCALE LOAD BALANCERS
  # ============================================================================
  maxscale-hornos:
    image: mariadb/maxscale:24.02
    container_name: maxscale-hornos
    volumes:
      - ./maxscale/maxscale_hornos.cnf:/etc/maxscale.cnf
    ports:
      - "4006:4006"
      - "8989:8989"
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "show", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  maxscale-sanlorenzo:
    image: mariadb/maxscale:24.02
    container_name: maxscale-sanlorenzo
    volumes:
      - ./maxscale/maxscale_sanlorenzo.cnf:/etc/maxscale.cnf
    ports:
      - "4007:4006"
      - "8990:8989"
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "show", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # REDIS
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis-airflow
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # AIRFLOW 3 SERVICES
  # ============================================================================
  airflow-init:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz8kOUedobJZhNrZq_7BhCOo=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      maxscale-hornos:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
        echo '=== Init Complete ==='
      "

  airflow-webserver:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz8kOUedobJZhNrZq_7BhCOo=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz8kOUedobJZhNrZq_7BhCOo=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    restart: unless-stopped

  airflow-worker-1:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-worker-1
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz8kOUedobJZhNrZq_7BhCOo=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow celery worker
    restart: unless-stopped

  airflow-worker-2:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-worker-2
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz8kOUedobJZhNrZq_7BhCOo=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow celery worker
    restart: unless-stopped