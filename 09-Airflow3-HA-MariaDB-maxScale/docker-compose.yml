# ============================================================================
# AIRFLOW 3.x HA + MAXSCALE + MARIADB - CARPETA 09
# ============================================================================
# Airflow 3.x con alta disponibilidad usando MaxScale como proxy
# MariaDB Primary/Replica con replicación GTID
# Basado en la configuración funcional de carpeta 08
# ============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@maxscale-hornos:4006/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver:8080"
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
    AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
    AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow.cfg:/opt/airflow/airflow.cfg
    - airflow-logs:/opt/airflow/logs
  depends_on:
    mariadb-hornos:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - airflow-net

services:

  mariadb-hornos:
    image: mariadb:10.11
    container_name: mariadb-hornos
    hostname: mariadb-hornos
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./mariadb/primary/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-hornos-data:/var/lib/mysql
    command: >
      --server-id=1
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - airflow-net
    ports:
      - "3306:3306"

  mariadb-sanlorenzo:
    image: mariadb:10.11
    container_name: mariadb-sanlorenzo
    hostname: mariadb-sanlorenzo
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./mariadb/replica/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-sanlorenzo-data:/var/lib/mysql
    command: >
      --server-id=2
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --read-only=ON
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - airflow-net
    ports:
      - "3307:3306"

  mariadb-tucuman:
    image: mariadb:10.11
    container_name: mariadb-tucuman
    hostname: mariadb-tucuman
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./mariadb/arbitrator/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-tucuman-data:/var/lib/mysql
    command: >
      --server-id=3
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --read-only=ON
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 50s
    networks:
      - airflow-net
    ports:
      - "3308:3306"

  maxscale-hornos:
    image: mariadb/maxscale:24.02
    container_name: maxscale-hornos
    hostname: maxscale-hornos
    user: "0:0"
    environment:
      - MAXSCALE_DISABLE_MONIT=1
    volumes:
      - ./maxscale/maxscale_hornos.cnf:/etc/maxscale.cnf:ro
    ports:
      - "4006:4006"  # Read-Write Service
      - "8989:8989"  # MaxScale Admin
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "list", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 55s
    command: >
      sh -c '
        echo "Starting MaxScale Hornos..."
        rm -f /etc/monit/monitrc /etc/monit.d/* 2>/dev/null || true
        killall monit 2>/dev/null || true
        maxscale --nodaemon --user=root --log=stdout
      '
    networks:
      - airflow-net

  maxscale-sanlorenzo:
    image: mariadb/maxscale:24.02
    container_name: maxscale-sanlorenzo
    hostname: maxscale-sanlorenzo
    user: "0:0"
    environment:
      - MAXSCALE_DISABLE_MONIT=1
    volumes:
      - ./maxscale/maxscale_sanlorenzo.cnf:/etc/maxscale.cnf:ro
    ports:
      - "4007:4006"  # Read-Write Service
      - "8990:8989"  # MaxScale Admin
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "list", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: >
      sh -c '
        echo "Starting MaxScale San Lorenzo..."
        rm -f /etc/monit/monitrc /etc/monit.d/* 2>/dev/null || true
        killall monit 2>/dev/null || true
        maxscale --nodaemon --user=root --log=stdout
      '
    networks:
      - airflow-net

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airflow-net

  airflow-init:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@maxscale-hornos:4006/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__BASE_URL: "http://airflow-apiserver:8080"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
      _AIRFLOW_DB_MIGRATE: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow.cfg:/opt/airflow/airflow.cfg
      - airflow-logs:/opt/airflow/logs
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      redis:
        condition: service_healthy
      maxscale-hornos:
        condition: service_healthy
    networks:
      - airflow-net
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - bash
      - -c
      - |
        echo "=== Airflow 3.x DB Migration ==="
        airflow db migrate
        echo "=== Init Complete ==="
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    hostname: airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    hostname: airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-1:
    <<: *airflow-common
    container_name: airflow-worker-1
    hostname: airflow-worker-1
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-2:
    <<: *airflow-common
    container_name: airflow-worker-2
    hostname: airflow-worker-2
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mariadb-hornos-data:
  mariadb-sanlorenzo-data:
  mariadb-tucuman-data:
  airflow-logs:

networks:
  airflow-net:
    driver: bridge