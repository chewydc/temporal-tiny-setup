global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  1m
    timeout server  1m
    option forwardfor
    option http-server-close

# =============================================================================
# Airflow UI/API — routes to the ACTIVE region only
# Site-controller returns 200 only when region is active + healthy
# =============================================================================
frontend airflow_frontend
    bind *:8080
    default_backend airflow_backend

backend airflow_backend
    balance first
    option httpchk GET /region-health
    http-check expect status 200
    default-server inter 10s fall 3 rise 2

    # Hornos preferred (listed first with 'balance first')
    # Health check goes to site-controller (port 8100), traffic goes to airflow (port 8080)
    server airflow-hornos airflow-apiserver-hornos:8080 check addr site-controller-hornos port 8100
    server airflow-sanlorenzo airflow-apiserver-sanlorenzo:8080 check addr site-controller-sanlorenzo port 8100

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
