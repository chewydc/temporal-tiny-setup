# ============================================================================
# AIRFLOW 3.x MULTI-SITE HA + MAXSCALE + MARIADB - CARPETA 10
# ============================================================================
# Dos instancias de Airflow (Hornos y San Lorenzo) con HA
# Cada Airflow apunta a su MaxScale local
# HAProxy arriba balanceando entre ambos Airflow
# MariaDB cluster compartido con replicación GTID
# ============================================================================

x-airflow-hornos: &airflow-hornos
  image: apache/airflow:3.1.8-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@maxscale-hornos:4006/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis-hornos:6379/0
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
    AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
    AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow.cfg:/opt/airflow/airflow.cfg
    - airflow-hornos-logs:/opt/airflow/logs
  depends_on:
    mariadb-hornos:
      condition: service_healthy
    redis-hornos:
      condition: service_healthy
    maxscale-hornos:
      condition: service_healthy
  networks:
    - airflow-net

x-airflow-sanlorenzo: &airflow-sanlorenzo
  image: apache/airflow:3.1.8-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@maxscale-sanlorenzo:4006/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@maxscale-sanlorenzo:4006/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis-sanlorenzo:6379/0
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
    AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
    AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow.cfg:/opt/airflow/airflow.cfg
    - airflow-sanlorenzo-logs:/opt/airflow/logs
  depends_on:
    mariadb-sanlorenzo:
      condition: service_healthy
    redis-sanlorenzo:
      condition: service_healthy
    maxscale-sanlorenzo:
      condition: service_healthy
  networks:
    - airflow-net

services:

  mariadb-hornos:
    image: mariadb:10.11
    container_name: mariadb-hornos
    hostname: mariadb-hornos
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow_pass
    volumes:
      - ./mariadb/primary/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-hornos-data:/var/lib/mysql
    command: >
      --server-id=1
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - airflow-net
    ports:
      - "3306:3306"

  mariadb-sanlorenzo:
    image: mariadb:10.11
    container_name: mariadb-sanlorenzo
    hostname: mariadb-sanlorenzo
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./mariadb/replica/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-sanlorenzo-data:/var/lib/mysql
    command: >
      --server-id=2
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --read-only=ON
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - airflow-net
    ports:
      - "3307:3306"

  mariadb-tucuman:
    image: mariadb:10.11
    container_name: mariadb-tucuman
    hostname: mariadb-tucuman
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./mariadb/arbitrator/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb-tucuman-data:/var/lib/mysql
    command: >
      --server-id=3
      --log-bin=mariadb-bin
      --binlog-format=ROW
      --gtid-strict-mode=ON
      --log-slave-updates=ON
      --read-only=ON
    depends_on:
      mariadb-hornos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 50s
    networks:
      - airflow-net
    ports:
      - "3308:3306"

  maxscale-hornos:
    image: mariadb/maxscale:24.02
    container_name: maxscale-hornos
    hostname: maxscale-hornos
    user: "0:0"
    environment:
      - MAXSCALE_DISABLE_MONIT=1
    volumes:
      - ./maxscale/maxscale_hornos.cnf:/etc/maxscale.cnf:ro
    ports:
      - "4006:4006"  # Read-Write Service
      - "8989:8989"  # MaxScale Admin
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "list", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 55s
    command: >
      sh -c '
        echo "Starting MaxScale Hornos..."
        rm -f /etc/monit/monitrc /etc/monit.d/* 2>/dev/null || true
        killall monit 2>/dev/null || true
        maxscale --nodaemon --user=root --log=stdout
      '
    networks:
      - airflow-net

  maxscale-sanlorenzo:
    image: mariadb/maxscale:24.02
    container_name: maxscale-sanlorenzo
    hostname: maxscale-sanlorenzo
    user: "0:0"
    environment:
      - MAXSCALE_DISABLE_MONIT=1
    volumes:
      - ./maxscale/maxscale_sanlorenzo.cnf:/etc/maxscale.cnf:ro
    ports:
      - "4007:4006"  # Read-Write Service
      - "8990:8990"  # MaxScale Admin
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      mariadb-sanlorenzo:
        condition: service_healthy
      mariadb-tucuman:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "maxctrl", "list", "servers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    command: >
      sh -c '
        echo "Starting MaxScale San Lorenzo..."
        rm -f /etc/monit/monitrc /etc/monit.d/* 2>/dev/null || true
        killall monit 2>/dev/null || true
        maxscale --nodaemon --user=root --log=stdout
      '
    networks:
      - airflow-net

  # ============================================================================
  # REDIS INSTANCES - One per site
  # ============================================================================
  redis-hornos:
    image: redis:7-alpine
    container_name: redis-hornos
    hostname: redis-hornos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airflow-net

  redis-sanlorenzo:
    image: redis:7-alpine
    container_name: redis-sanlorenzo
    hostname: redis-sanlorenzo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airflow-net

  # ============================================================================
  # HEALTH CHECK MICROSERVICES - One per region
  # ============================================================================
  healthcheck-hornos:
    build: ./healthcheck
    container_name: healthcheck-hornos
    hostname: healthcheck-hornos
    environment:
      - REGION_NAME=hornos
      - AIRFLOW_URL=http://airflow-apiserver-hornos:8080
      - HEALTH_CHECK_INTERVAL=30
      - FAILURE_THRESHOLD=3
      - RECOVERY_THRESHOLD=2
      - LISTEN_PORT=8000
    ports:
      - "8001:8000"
    networks:
      - airflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  healthcheck-sanlorenzo:
    build: ./healthcheck
    container_name: healthcheck-sanlorenzo
    hostname: healthcheck-sanlorenzo
    environment:
      - REGION_NAME=sanlorenzo
      - AIRFLOW_URL=http://airflow-apiserver-sanlorenzo:8080
      - HEALTH_CHECK_INTERVAL=30
      - FAILURE_THRESHOLD=3
      - RECOVERY_THRESHOLD=2
      - LISTEN_PORT=8000
    ports:
      - "8002:8000"
    networks:
      - airflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # HAPROXY - Load balancer for Airflow instances
  # ============================================================================
  haproxy-airflow:
    image: haproxy:2.9
    container_name: haproxy-airflow
    hostname: haproxy-airflow
    ports:
      - "8080:8080"   # Main entry point for Airflow UI
    volumes:
      - ./haproxy/haproxy-airflow.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - airflow-apiserver-hornos
      - airflow-apiserver-sanlorenzo
    networks:
      - airflow-net

  # ============================================================================
  # AIRFLOW HORNOS SITE
  # ============================================================================
  airflow-init-hornos:
    image: apache/airflow:3.1.8-python3.11
    container_name: airflow-init-hornos
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow_pass@maxscale-hornos:4006/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://redis-hornos:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow_pass@maxscale-hornos:4006/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: "temporary_secret_key_for_dev"
      AIRFLOW__API_AUTH__JWT_SECRET: "temporary_jwt_secret_for_dev"
      AIRFLOW_CONFIG: "/opt/airflow/airflow.cfg"
      _AIRFLOW_DB_MIGRATE: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow.cfg:/opt/airflow/airflow.cfg
      - airflow-hornos-logs:/opt/airflow/logs
    depends_on:
      mariadb-hornos:
        condition: service_healthy
      redis-hornos:
        condition: service_healthy
      maxscale-hornos:
        condition: service_healthy
    networks:
      - airflow-net
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - bash
      - -c
      - |
        echo "=== Airflow 3.x DB Migration (Hornos) ==="
        airflow db migrate
        echo "=== Init Complete (Hornos) ==="
    restart: "no"

  airflow-apiserver-hornos:
    <<: *airflow-hornos
    container_name: airflow-apiserver-hornos
    hostname: airflow-apiserver-hornos
    command: api-server
    ports:
      - "8081:8080"  # Direct access to Hornos
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler-hornos:
    <<: *airflow-hornos
    container_name: airflow-scheduler-hornos
    hostname: airflow-scheduler-hornos
    command: scheduler
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor-hornos:
    <<: *airflow-hornos
    container_name: airflow-dag-processor-hornos
    hostname: airflow-dag-processor-hornos
    command: dag-processor
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-hornos-1:
    <<: *airflow-hornos
    container_name: airflow-worker-hornos-1
    hostname: airflow-worker-hornos-1
    command: celery worker
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-hornos-2:
    <<: *airflow-hornos
    container_name: airflow-worker-hornos-2
    hostname: airflow-worker-hornos-2
    command: celery worker
    depends_on:
      airflow-init-hornos:
        condition: service_completed_successfully
    restart: unless-stopped

  # ============================================================================
  # AIRFLOW SAN LORENZO SITE
  # ============================================================================
  airflow-apiserver-sanlorenzo:
    <<: *airflow-sanlorenzo
    container_name: airflow-apiserver-sanlorenzo
    hostname: airflow-apiserver-sanlorenzo
    command: api-server
    ports:
      - "8082:8080"  # Direct access to San Lorenzo
    depends_on:
      airflow-init-hornos:  # Uses same DB, so depends on Hornos init
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler-sanlorenzo:
    <<: *airflow-sanlorenzo
    container_name: airflow-scheduler-sanlorenzo
    hostname: airflow-scheduler-sanlorenzo
    command: scheduler
    depends_on:
      airflow-init-hornos:  # Uses same DB, so depends on Hornos init
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor-sanlorenzo:
    <<: *airflow-sanlorenzo
    container_name: airflow-dag-processor-sanlorenzo
    hostname: airflow-dag-processor-sanlorenzo
    command: dag-processor
    depends_on:
      airflow-init-hornos:  # Uses same DB, so depends on Hornos init
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-sanlorenzo-1:
    <<: *airflow-sanlorenzo
    container_name: airflow-worker-sanlorenzo-1
    hostname: airflow-worker-sanlorenzo-1
    command: celery worker
    depends_on:
      airflow-init-hornos:  # Uses same DB, so depends on Hornos init
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-worker-sanlorenzo-2:
    <<: *airflow-sanlorenzo
    container_name: airflow-worker-sanlorenzo-2
    hostname: airflow-worker-sanlorenzo-2
    command: celery worker
    depends_on:
      airflow-init-hornos:  # Uses same DB, so depends on Hornos init
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mariadb-hornos-data:
  mariadb-sanlorenzo-data:
  mariadb-tucuman-data:
  airflow-hornos-logs:
  airflow-sanlorenzo-logs:

networks:
  airflow-net:
    driver: bridge