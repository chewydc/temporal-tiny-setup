global
    log stdout format raw local0
    stats socket /var/run/haproxy.sock mode 660 level admin
    stats timeout 30s

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  1m
    timeout server  1m
    option forwardfor
    option http-server-close

# Frontend for Airflow UI
frontend airflow_frontend
    bind *:8080
    default_backend airflow_backend

# Backend for Airflow instances
backend airflow_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 10s fall 3 rise 2

    server airflow-hornos airflow-apiserver-hornos:8080 check
    server airflow-sanlorenzo airflow-apiserver-sanlorenzo:8080 check

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE