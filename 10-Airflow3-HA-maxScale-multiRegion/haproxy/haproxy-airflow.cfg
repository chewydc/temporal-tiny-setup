global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  1m
    timeout server  1m
    option forwardfor
    option http-server-close

frontend airflow_frontend
    bind *:8080
    default_backend airflow_backend

backend airflow_backend
    balance first
    option httpchk GET /api/v2/monitor/health
    http-check expect status 200
    default-server inter 30s fall 3 rise 2
    
    server airflow-hornos airflow-apiserver-hornos:8080 check
    server airflow-sanlorenzo airflow-apiserver-sanlorenzo:8080 check backup

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
